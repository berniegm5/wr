<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f8f6f1">
<title>ATELIER</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Didact+Gothic&display=swap" rel="stylesheet">
<style>

/* ── RESET + BASE ──────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–cream:   #f8f6f1;
–ivory:   #f0ede5;
–border:  #d8d4ca;
–rule:    #c8c4ba;
–ink:     #111009;
–mid:     #7a7670;
–light:   #b0ada6;
–gold:    #9a8a6a;
–safe-t:  env(safe-area-inset-top,  0px);
–safe-b:  env(safe-area-inset-bottom, 0px);
}

html { height: 100%; background: var(–cream); }
body {
min-height: 100%;
background: var(–cream);
color: var(–ink);
font-family: ‘Didact Gothic’, ‘Gill Sans’, sans-serif;
-webkit-tap-highlight-color: transparent;
overflow-x: hidden;
}

/* ── HEADER ────────────────────────────────────── */
header {
padding: calc(var(–safe-t) + 36px) 28px 0;
text-align: center;
position: relative;
}

.header-rule {
width: 100%;
height: 1px;
background: linear-gradient(90deg, transparent, var(–rule), transparent);
margin-bottom: 22px;
}

.brand {
font-family: ‘Playfair Display’, ‘Didot’, ‘Big Caslon’, serif;
font-size: 11px;
font-weight: 400;
letter-spacing: .5em;
text-transform: uppercase;
color: var(–gold);
margin-bottom: 18px;
}

.headline {
font-family: ‘Playfair Display’, ‘Didot’, serif;
font-size: 52px;
font-weight: 400;
line-height: .95;
letter-spacing: -.01em;
color: var(–ink);
margin-bottom: 6px;
}

.headline em {
font-style: italic;
font-weight: 400;
}

.subhead {
font-size: 11px;
letter-spacing: .22em;
text-transform: uppercase;
color: var(–light);
margin-bottom: 28px;
}

.header-rule-bottom {
width: 1px; height: 32px;
background: linear-gradient(180deg, var(–rule), transparent);
margin: 0 auto;
}

/* ── OCASIÓN SELECTOR ──────────────────────────── */
.section-label {
font-size: 9px;
letter-spacing: .3em;
text-transform: uppercase;
color: var(–light);
text-align: center;
padding: 28px 28px 16px;
}

.occ-grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 1px;
background: var(–border);
margin: 0 28px;
border: 1px solid var(–border);
}

.occ-btn {
background: var(–cream);
border: none;
padding: 20px 8px;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 8px;
transition: background .18s;
position: relative;
}

.occ-btn:active { background: var(–ivory); }

.occ-btn.selected {
background: var(–ink);
}

.occ-btn::after {
content: ‘’;
position: absolute;
bottom: 0; left: 10%; right: 10%; height: 1px;
background: var(–gold);
transform: scaleX(0);
transition: transform .25s;
}
.occ-btn.selected::after { transform: scaleX(1); }

.occ-icon  { font-size: 20px; }
.occ-label {
font-size: 9px;
letter-spacing: .22em;
text-transform: uppercase;
color: var(–mid);
transition: color .18s;
}
.occ-btn.selected .occ-label { color: var(–cream); }
.occ-btn.selected .occ-icon  { filter: none; }

/* ── DIVIDER ───────────────────────────────────── */
.ornament {
text-align: center;
padding: 24px 0 0;
font-family: ‘Playfair Display’, serif;
font-size: 18px;
color: var(–border);
letter-spacing: .3em;
}

/* ── OUTFIT CARD ───────────────────────────────── */
.outfit-section {
padding: 0 28px 24px;
}

.outfit-meta {
display: flex;
align-items: baseline;
justify-content: space-between;
padding: 16px 0 14px;
border-bottom: 1px solid var(–border);
margin-bottom: 0;
}

.outfit-counter {
font-size: 10px;
letter-spacing: .2em;
text-transform: uppercase;
color: var(–light);
}

.outfit-title {
font-family: ‘Playfair Display’, serif;
font-size: 15px;
font-style: italic;
color: var(–gold);
}

/* prenda rows */
.prenda {
display: flex;
align-items: center;
padding: 15px 0;
border-bottom: 1px solid var(–ivory);
gap: 14px;
animation: slideIn .3s ease both;
}
.prenda:last-child { border-bottom: 1px solid var(–border); }
.prenda.na { opacity: .3; }

@keyframes slideIn {
from { opacity: 0; transform: translateY(6px); }
to   { opacity: 1; transform: translateY(0); }
}

.prenda-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
.prenda-body { flex: 1; min-width: 0; }
.prenda-cat {
font-size: 8px;
letter-spacing: .24em;
text-transform: uppercase;
color: var(–light);
margin-bottom: 2px;
}
.prenda-val {
font-family: ‘Playfair Display’, serif;
font-size: 16px;
font-weight: 400;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
color: var(–ink);
}
.prenda.na .prenda-val {
font-style: italic;
color: var(–light);
font-family: ‘Didact Gothic’, sans-serif;
font-size: 13px;
}

/* ── GENERATE BUTTON ───────────────────────────── */
.gen-wrap {
padding: 20px 28px 0;
}

.btn-gen {
width: 100%;
background: var(–ink);
color: var(–cream);
border: none;
padding: 19px 24px;
font-size: 10px;
letter-spacing: .38em;
text-transform: uppercase;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
gap: 14px;
transition: background .18s, transform .15s;
font-family: ‘Didact Gothic’, sans-serif;
}
.btn-gen:active { background: #2a2820; transform: scale(.99); }

.btn-gen .dice { font-size: 16px; }
.btn-gen.spin .dice { animation: rolldie .4s ease; }
@keyframes rolldie {
0%   { transform: rotate(0)      scale(1);   }
50%  { transform: rotate(180deg) scale(1.4); }
100% { transform: rotate(360deg) scale(1);   }
}

.gen-hint {
text-align: center;
font-size: 9px;
letter-spacing: .16em;
text-transform: uppercase;
color: var(–light);
padding: 12px 0 0;
}

/* ── RULE + EDIT ───────────────────────────────── */
.mid-rule {
width: 100%;
height: 1px;
background: linear-gradient(90deg, transparent, var(–border), transparent);
margin: 28px 0 0;
}

.edit-toggle-wrap {
text-align: center;
padding: 18px 28px 0;
}

.btn-edit-toggle {
background: none;
border: 1px solid var(–border);
color: var(–mid);
padding: 12px 28px;
font-size: 9px;
letter-spacing: .3em;
text-transform: uppercase;
cursor: pointer;
font-family: ‘Didact Gothic’, sans-serif;
transition: all .2s;
width: 100%;
}
.btn-edit-toggle:active { background: var(–ivory); }
.btn-edit-toggle.open   { background: var(–ivory); color: var(–ink); border-color: var(–rule); }

/* ── EDITOR PANEL ──────────────────────────────── */
.editor-panel {
max-height: 0;
overflow: hidden;
transition: max-height .45s cubic-bezier(.77,0,.18,1);
}
.editor-panel.open { max-height: 2400px; }

.editor-inner { padding: 0 28px 32px; }

.edit-occ-tabs {
display: flex;
border-bottom: 1px solid var(–border);
margin: 20px 0 0;
}
.edit-tab {
flex: 1;
padding: 12px 6px;
font-size: 9px;
letter-spacing: .18em;
text-transform: uppercase;
text-align: center;
cursor: pointer;
color: var(–light);
border-bottom: 1.5px solid transparent;
transition: all .2s;
font-family: ‘Didact Gothic’, sans-serif;
}
.edit-tab.active { color: var(–ink); border-bottom-color: var(–ink); }

.edit-cat { margin-top: 22px; }
.edit-cat-label {
font-size: 8px;
letter-spacing: .26em;
text-transform: uppercase;
color: var(–gold);
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 8px;
}

.edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }

.edit-input {
flex: 1;
background: var(–ivory);
border: 1px solid var(–border);
padding: 10px 13px;
color: var(–ink);
font-family: ‘Playfair Display’, serif;
font-size: 14px;
outline: none;
border-radius: 0;
transition: border-color .2s;
-webkit-appearance: none;
}
.edit-input:focus { border-color: var(–ink); }

.btn-del {
width: 34px; height: 34px;
background: none;
border: 1px solid var(–border);
color: var(–light);
font-size: 12px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
transition: all .15s;
}
.btn-del:active { background: #fde8e8; border-color: #d88; color: #900; }

.btn-add-item {
width: 100%;
background: none;
border: 1px dashed var(–border);
padding: 10px;
color: var(–light);
font-size: 9px;
letter-spacing: .2em;
text-transform: uppercase;
cursor: pointer;
font-family: ‘Didact Gothic’, sans-serif;
transition: all .2s;
margin-top: 4px;
}
.btn-add-item:active { background: var(–ivory); color: var(–ink); border-color: var(–rule); }

.na-note {
font-size: 11px;
font-style: italic;
color: var(–light);
padding: 4px 0 8px;
font-family: ‘Playfair Display’, serif;
}

.btn-save {
width: 100%;
background: var(–ink);
color: var(–cream);
border: none;
padding: 18px;
font-size: 10px;
letter-spacing: .36em;
text-transform: uppercase;
cursor: pointer;
font-family: ‘Didact Gothic’, sans-serif;
margin-top: 24px;
transition: background .18s;
}
.btn-save:active { background: #2a2820; }

/* ── FOOTER ────────────────────────────────────── */
.footer {
padding: calc(24px + var(–safe-b)) 28px 0;
text-align: center;
border-top: 1px solid var(–border);
margin-top: 28px;
}
.footer p {
font-size: 9px;
letter-spacing: .22em;
text-transform: uppercase;
color: var(–light);
padding-bottom: 24px;
}

/* ── TOAST ─────────────────────────────────────── */
.toast {
position: fixed;
bottom: 36px; left: 50%;
transform: translateX(-50%) translateY(12px);
background: var(–ink); color: var(–cream);
padding: 10px 24px;
font-size: 9px; letter-spacing: .26em; text-transform: uppercase;
font-family: ‘Didact Gothic’, sans-serif;
opacity: 0; transition: all .3s;
pointer-events: none; white-space: nowrap; z-index: 9999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

</style>
</head>
<body>

<!-- ── HEADER ── -->

<header>
  <div class="header-rule"></div>
  <p class="brand">Atelier Personnel</p>
  <h1 class="headline">Mon<br><em>Outfit</em></h1>
  <p class="subhead">Collection Privée</p>
  <div class="header-rule-bottom"></div>
</header>

<!-- ── OCASIÓN ── -->

<p class="section-label">Selecciona la ocasión</p>
<div class="occ-grid">
  <button class="occ-btn selected" data-occ="trabajo" onclick="setOcc('trabajo',this)">
    <span class="occ-icon">💼</span>
    <span class="occ-label">Trabajo</span>
  </button>
  <button class="occ-btn" data-occ="cita" onclick="setOcc('cita',this)">
    <span class="occ-icon">🌙</span>
    <span class="occ-label">Cita</span>
  </button>
  <button class="occ-btn" data-occ="casual" onclick="setOcc('casual',this)">
    <span class="occ-icon">☀️</span>
    <span class="occ-label">Casual</span>
  </button>
</div>

<div class="ornament">— ✦ —</div>

<!-- ── OUTFIT ── -->

<div class="outfit-section">
  <div class="outfit-meta">
    <span class="outfit-counter">Look <span id="outfitNum">#1</span></span>
    <span class="outfit-title" id="outfitTitle">Pour le bureau</span>
  </div>
  <div id="prendasList"></div>
</div>

<!-- ── GENERAR ── -->

<div class="gen-wrap">
  <button class="btn-gen" id="genBtn" onclick="generar()">
    <span class="dice">✦</span>
    <span>Nouveau look</span>
  </button>
  <p class="gen-hint">Toca para generar una nueva combinación</p>
</div>

<!-- ── EDITAR ── -->

<div class="mid-rule"></div>
<div class="edit-toggle-wrap">
  <button class="btn-edit-toggle" id="editToggleBtn" onclick="toggleEditor()">
    Editar mis prendas
  </button>
</div>

<div class="editor-panel" id="editorPanel">
  <div class="editor-inner">
    <div class="edit-occ-tabs">
      <div class="edit-tab active" onclick="setEditOcc('trabajo')">💼 Trabajo</div>
      <div class="edit-tab" onclick="setEditOcc('cita')">🌙 Cita</div>
      <div class="edit-tab" onclick="setEditOcc('casual')">☀️ Casual</div>
    </div>
    <div id="editBody"></div>
    <button class="btn-save" onclick="guardar()">Guardar</button>
  </div>
</div>

<!-- ── FOOTER ── -->

<div class="footer">
  <p>Generador personal · Édition privée</p>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// DATOS
// ═══════════════════════════════════════════════
const DEFAULT = {
  trabajo:{
    arriba:["Polo blanco liso","Polo azul marino","Polo gris claro","Camiseta negra básica","Polo verde olivo","Polo burdeos","Camiseta blanca cuello V","Polo beige","Oxford blanca","Oxford azul claro","Camisa cuadros grises","Camisa azul marino","Camisa blanca slim","Camisa beige lino","Oxford celeste","Oxford rayas finas"],
    pantalon:["Chino beige","Chino negro","Chino gris","Chino azul marino","Pantalón dress negro","Pantalón dress gris","Chino marrón","Pantalón dress azul"],
    tenis:null,
    formal:["Derby negro","Oxford café","Derby marrón","Monk strap negro","Oxford cognac","Derby azul","Mocasín negro","Derby gris"],
    casual_shoe:null,
    chamarra:["Sin chamarra","Blazer gris","Blazer azul marino","Blazer negro","Blazer beige","Blazer cuadros","Blazer camel","Blazer burdeos"],
  },
  cita:{
    arriba:["Camiseta negra slim","Camiseta blanca básica","Camiseta gris oscuro","Camiseta burdeos","Polo negro","Camiseta vino","Camisa negra","Camisa blanca slim","Camisa azul oscuro","Camisa gris marengo","Camisa vino","Oxford blanca","Camisa burdeos","Camisa gris carbón"],
    pantalon:["Jeans negro slim","Chino negro","Jeans azul oscuro slim","Pantalón gris oscuro","Jeans gris","Chino marrón oscuro","Jeans negro skinny","Jeans azul índigo"],
    tenis:["Sneakers blancos limpios","Sneakers negros","Sneakers gris claro","Sneakers cuero blanco","Sneakers negro mate","Sneakers minimalistas"],
    formal:["Derby negro","Chelsea boots negro","Oxford café oscuro","Chelsea boots café","Monk strap negro","Chelsea boots cognac"],
    casual_shoe:null,
    chamarra:["Sin chamarra","Bomber negra","Chaqueta cuero negra","Blazer negro","Bomber gris","Blazer azul marino","Bomber azul marino","Blazer negro slim"],
  },
  casual:{
    arriba:["Camiseta blanca básica","Camiseta negra","Camiseta gris","Camiseta azul","Camiseta verde","Camiseta estampada","Polo blanco","Camiseta mostaza","Camisa flanela cuadros","Overshirt mezclilla","Camisa hawaiana","Camisa lino beige","Camisa flanela gris","Overshirt verde","Camisa lino blanca","Camisa café lino"],
    pantalon:["Jeans azul clásico","Jeans negro","Jeans gris","Shorts beige","Shorts azul","Jogger gris","Cargo verde","Shorts negro"],
    tenis:["Tenis blancos","Tenis negros","Tenis grises","Converse blanco","Converse negro","Vans negros","Tenis coloridos","Vans gris"],
    formal:null,
    casual_shoe:["Huaraches cuero","Sandalias café","Slip-on negro","Mocasín casual beige","Espadrilles beige","Slip-on blanco","Sandalias negras","Slip-on gris"],
    chamarra:["Sin chamarra","Hoodie gris","Hoodie negro","Bomber verde","Chaqueta mezclilla","Overshirt flanela","Hoodie blanco","Bomber beige"],
  }
};

const CATS = [
  {key:'arriba',     icon:'👕', label:'Partie du haut'},
  {key:'pantalon',   icon:'👖', label:'Pantalón'},
  {key:'tenis',      icon:'👟', label:'Tenis / Sneakers'},
  {key:'formal',     icon:'👞', label:'Calzado formal'},
  {key:'casual_shoe',icon:'🥾', label:'Calzado casual'},
  {key:'chamarra',   icon:'🧥', label:'Chamarra'},
];

const TITLES = {
  trabajo:['Pour le bureau','Style professionnel','Au travail','Réunion du jour'],
  cita:   ['Pour ce soir','Une nuit spéciale','Soirée élégante','Rendez-vous'],
  casual: ["L'essentiel du jour",'Week-end style','Décontracté chic','Simplicité'],
};

let occ='trabajo', editOcc='trabajo', count=1, prendas={};

function load(){ const s=localStorage.getItem('atelier_v1'); prendas=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT)); }
function save(){ localStorage.setItem('atelier_v1',JSON.stringify(prendas)); }
function rand(a){ return a[Math.floor(Math.random()*a.length)]; }

// ── OCASIÓN ──
function setOcc(o, btn){
  occ = o;
  document.querySelectorAll('.occ-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  generar(false);
}

// ── GENERAR ──
function generar(animate=true){
  if(animate){
    const b=document.getElementById('genBtn');
    b.classList.add('spin');
    setTimeout(()=>b.classList.remove('spin'),420);
    count++;
  }
  document.getElementById('outfitNum').textContent = '#'+count;
  document.getElementById('outfitTitle').textContent = rand(TITLES[occ]);

  const list=document.getElementById('prendasList');
  list.innerHTML='';
  const data=prendas[occ];

  CATS.forEach((cat,i)=>{
    const opts=data[cat.key];
    const row=document.createElement('div');
    row.className='prenda'+((!opts||!opts.length)?' na':'');
    row.style.animationDelay=(i*50)+'ms';
    const val=opts&&opts.length ? rand(opts) : 'Non applicable';
    row.innerHTML=`<div class="prenda-icon">${cat.icon}</div><div class="prenda-body"><div class="prenda-cat">${cat.label}</div><div class="prenda-val">${val}</div></div>`;
    list.appendChild(row);
  });
}

// ── EDITOR ──
let editorOpen=false;
function toggleEditor(){
  editorOpen=!editorOpen;
  document.getElementById('editorPanel').classList.toggle('open',editorOpen);
  document.getElementById('editToggleBtn').classList.toggle('open',editorOpen);
  document.getElementById('editToggleBtn').textContent = editorOpen ? 'Cerrar editor' : 'Editar mis prendas';
  if(editorOpen){ editOcc=occ; syncEditTabs(); renderEditor(); setTimeout(()=>{ document.getElementById('editorPanel').scrollIntoView({behavior:'smooth',block:'start'}); },100); }
}

function setEditOcc(o){ editOcc=o; syncEditTabs(); renderEditor(); }

function syncEditTabs(){
  const occs=['trabajo','cita','casual'];
  document.querySelectorAll('.edit-tab').forEach((t,i)=>t.classList.toggle('active',occs[i]===editOcc));
}

function renderEditor(){
  const body=document.getElementById('editBody');
  body.innerHTML='';
  const data=prendas[editOcc];
  CATS.forEach(cat=>{
    const sec=document.createElement('div');
    sec.className='edit-cat';
    sec.innerHTML=`<div class="edit-cat-label"><span>${cat.icon}</span>${cat.label}</div>`;
    if(data[cat.key]===null){
      sec.innerHTML+=`<p class="na-note">No aplica para este modo.</p>`;
      const ab=document.createElement('button');
      ab.className='btn-add-item'; ab.textContent='+ Activar';
      ab.onclick=()=>{ prendas[editOcc][cat.key]=['']; renderEditor(); };
      sec.appendChild(ab);
    } else {
      const rows=document.createElement('div');
      rows.id='erows-'+cat.key;
      (data[cat.key]||[]).forEach((v,i)=>rows.appendChild(mkRow(cat.key,i,v)));
      sec.appendChild(rows);
      const ab=document.createElement('button');
      ab.className='btn-add-item'; ab.textContent='+ Agregar prenda';
      ab.onclick=()=>{
        prendas[editOcc][cat.key].push('');
        const c=document.getElementById('erows-'+cat.key);
        c.appendChild(mkRow(cat.key,prendas[editOcc][cat.key].length-1,''));
        c.lastChild.querySelector('input').focus();
      };
      sec.appendChild(ab);
    }
    body.appendChild(sec);
  });
}

function mkRow(catKey,idx,val){
  const row=document.createElement('div');
  row.className='edit-row';
  const inp=document.createElement('input');
  inp.type='text'; inp.className='edit-input';
  inp.value=val==='—'?'':val;
  inp.placeholder='Nombre de la prenda...';
  inp.oninput=e=>{ prendas[editOcc][catKey][idx]=e.target.value; };
  const del=document.createElement('button');
  del.className='btn-del'; del.innerHTML='✕';
  del.onclick=()=>{ prendas[editOcc][catKey].splice(idx,1); if(!prendas[editOcc][catKey].length) prendas[editOcc][catKey]=null; renderEditor(); };
  row.appendChild(inp); row.appendChild(del);
  return row;
}

function guardar(){
  Object.keys(prendas).forEach(o=>{
    CATS.forEach(cat=>{
      const a=prendas[o][cat.key];
      if(Array.isArray(a)){ prendas[o][cat.key]=a.filter(v=>v.trim()!==''); if(!prendas[o][cat.key].length) prendas[o][cat.key]=null; }
    });
  });
  save();
  showToast('Guardado');
  setTimeout(()=>{ toggleEditor(); generar(false); },600);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

load(); generar(false);
</script>

</body>
</html>
